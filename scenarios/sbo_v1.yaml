events:
  - tick: 50
    type: loss_of_offsite_power
    effect:
      systems:
        Main-Feedwater: { status: tripped }
        Turbine-Gen: { status: tripped }
        Condenser: { status: tripped }
        MSS: { status: tripped }
      alarms:
        ALM-PRZ-PRESS-HIGH: { state: active, severity: warning, was_critical: false,
                              suppress_policy: conditional, setpoint_tier: high,
                              description: "가압기 압력 high (LOOP transient)" }
      procedures:
        active: AOP-3
        step: 0
  - tick: 60
    type: emergency_diesel_start
    effect:
      systems:
        EDG: { status: running }
        AFWS: { status: running }

action_effects: []
